<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.Design - 用设计塑造未来</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">O.Design</div>
            <nav>
                <a href="index.html" class="nav-link active">设计作品</a>
                <a href="about.html" class="nav-link">关于我</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-title animate-on-scroll">用设计塑造未来</h1>
                <p class="hero-subtitle animate-on-scroll">关注体验、细节与产品价值</p>
                <p class="hero-subtitle animate-on-scroll">让设计真正服务于用户，构建触手可及的交互美感</p>
                <a href="#works" class="btn btn-primary animate-on-scroll">探索作品集</a>
            </div>
        </section>

        <section class="categories" id="works">
            <div class="categories-container">
                <button class="category-tag active" data-category="all">APP</button>
                <button class="category-tag" data-category="miniapp">小程序</button>
                <button class="category-tag" data-category="admin">后台</button>
                <button class="category-tag" data-category="website">官网</button>
                <button class="category-tag" data-category="event">活动页</button>
                <button class="category-tag" data-category="aigc">AIGC</button>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-tagline">BUILTWITHVISION</div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
